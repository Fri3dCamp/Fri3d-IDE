<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
  <meta name="color-scheme" content="only light">
  <link rel="manifest" href="manifest.webmanifest">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#000000">
  <title>MicroPythonOS Virtual Badge</title>
  <style>
    /* ---- Tuning knobs ------------------------------------------------ */
    /* Layout uses the silkscreen SVG coordinate system (viewBox 119x54 mm).
       --u = CSS px per mm; element centers below come straight from the SVG.
       Elements are positioned by --cx/--cy (mm, center point). */
    :root {
      --u: 6.75px;             /* px per svg mm -- overall badge size */
      --joy-size: 14;          /* joystick pad (mm) */
      --nub-size: 7;           /* joystick nub (mm) */
      --btn-size: 6.5;         /* X/Y/A/B buttons (mm) */
      --btn-size-bottom: 5.5;  /* MENU/START buttons (mm) */
      --led-size: 5.5;         /* NeoPixel square (mm) */
      --led-pitch: 10.007;     /* LED center-to-center (mm): (79.3-39.271)/4 */
      --screen-cx: 59.5;       /* screen center (mm) */
      --screen-cy: 22.5;
    }

    html, body { margin: 0; height: 100%; overflow: hidden;
      display: flex; align-items: flex-start; justify-content: center;
      background: transparent !important; }

    /* Standalone (pop-out / PWA) mode: black backdrop, badge centered and
       scaled to fit the viewport (mobile landscape = full-screen badge). */
    body.popout { background: #000 !important; align-items: center; }
    body.popout #badge { transform-origin: center center; }

    /* Dock button (pop-out only): sends the badge back into the IDE. */
    #dock-btn {
      display: none;
      position: fixed; top: 8px; right: 8px; z-index: 10;
      width: 34px; height: 34px; padding: 0; line-height: 1;
      font: bold 15px system-ui; color: #000;
      background: #3ce8b3; border: 2px solid #000; cursor: pointer;
      user-select: none; -webkit-user-select: none;
    }
    body.popout #dock-btn { display: block; }

    /* Badge body: fixed 119x54 mm PCB with silkscreen overlay. */
    #badge {
      position: relative;
      width: calc(var(--u) * 119);
      height: calc(var(--u) * 54);
      background: #411657;
      border: 2px solid #e8a6a0;
      border-radius: calc(var(--u) * 4);
      user-select: none;
      -webkit-user-select: none;
      touch-action: none;
    }
    /* Silkscreen artwork layer: above PCB colour, below screen/controls. */
    #badge::before {
      content: '';
      position: absolute;
      inset: 0;
      background: url('../badge_silkscreen.svg') center / 100% 100% no-repeat;
      pointer-events: none;
    }
    /* Children paint above the silkscreen, centered on SVG mm coords. */
    #badge > * {
      position: absolute;
      z-index: 1;
      left: calc(var(--u) * var(--cx, 0));
      top: calc(var(--u) * var(--cy, 0));
      transform: translate(-50%, -50%);
    }

    #status { --cx: 59.5; --cy: 2;
      white-space: nowrap; color: #ffe9ff; font: 11px system-ui; pointer-events: none; }

    /* Screen: top edge flush with badge top, horizontally centered. */
    #screen { --cx: var(--screen-cx); --cy: 0; display: flex;
      transform: translate(-50%, 0); }
    canvas { image-rendering: pixelated; background: #000; outline: none;
      border: 4px solid #111; border-radius: 3px;
      touch-action: none; user-select: none; -webkit-user-select: none; }

    /* Joystick pad centered on its silkscreen footprint. */
    #joy-wrap { --cx: 16.6; --cy: 27; }
    #joystick {
      position: relative;
      width: calc(var(--u) * var(--joy-size)); height: calc(var(--u) * var(--joy-size));
      border-radius: 18%;
      background: #a9a9ad;
      box-shadow: inset 0 2px 6px rgba(255,255,255,.5), inset 0 -3px 6px rgba(0,0,0,.3);
      touch-action: none;
    }
    #joystick-nub {
      position: absolute; left: 50%; top: 50%;
      width: calc(var(--u) * var(--nub-size)); height: calc(var(--u) * var(--nub-size));
      margin: calc(var(--u) * var(--nub-size) / -2) 0 0 calc(var(--u) * var(--nub-size) / -2);
      border-radius: 50%;
      background: #8f8f94;
      border: 2px solid #77777c;
      cursor: grab;
    }

    /* Buttons: black keycaps centered on silkscreen positions. */
    .pad-button {
      width: calc(var(--u) * var(--btn-size)); height: calc(var(--u) * var(--btn-size));
      border-radius: 25%;
      background: #111;
      border: 3px solid #333;
      cursor: pointer;
      touch-action: none;
      box-shadow: 0 2px 0 rgba(0,0,0,.35);
      color: #d4a017; font: bold 13px system-ui;
    }
    .pad-button:active, .pad-button.pressed {
      background: #2a2a2a;
      box-shadow: 0 0 8px 2px rgba(255, 255, 255, .25);
    }
    .pad-button[data-button="x"] { --cx: 105.1; --cy: 17.5; }
    .pad-button[data-button="b"] { --cx: 105.1; --cy: 38.2; }
    .pad-button[data-button="y"] { --cx: 95.7;  --cy: 27.7; }
    .pad-button[data-button="a"] { --cx: 114;   --cy: 27.7; }
    .pad-button[data-button="menu"], .pad-button[data-button="start"] {
      width: calc(var(--u) * var(--btn-size-bottom)); height: calc(var(--u) * var(--btn-size-bottom));
    }
    .pad-button[data-button="menu"]  { --cx: 46;   --cy: 49.5; }
    .pad-button[data-button="start"] { --cx: 72.8; --cy: 49.5; }

    /* NeoPixels: LED1..LED5 centers from (39.271, 43.2) to (79.3, 43.2). */
    #leds {
      --cx: 59.2855; /* midpoint of LED1..LED5 */
      --cy: 43.2;
      display: flex;
      gap: calc(var(--u) * (var(--led-pitch) - var(--led-size)));
    }
    .led {
      width: calc(var(--u) * var(--led-size)); height: calc(var(--u) * var(--led-size));
      border-radius: 3px;
      background: #ddd;
      border: 1px solid #bbb;
      box-shadow: inset 0 0 4px rgba(0,0,0,.35);
    }
  </style>
</head>
<body>
  <button id="dock-btn" type="button" title="Dock badge back into the IDE"
          aria-label="Dock badge back into the IDE">⤋</button>
  <div id="badge">
    <div id="status">Loading MicroPythonOS…</div>
    <div id="joy-wrap">
      <div id="joystick"><div id="joystick-nub"></div></div>
    </div>
    <div id="screen">
      <canvas id="canvas" width="320" height="240" tabindex="0"
              oncontextmenu="event.preventDefault()"></canvas>
    </div>
    <button class="pad-button" data-button="x" type="button">X</button>
    <button class="pad-button" data-button="y" type="button">Y</button>
    <button class="pad-button" data-button="a" type="button">A</button>
    <button class="pad-button" data-button="b" type="button">B</button>
    <button class="pad-button" data-button="menu" type="button">M</button>
    <button class="pad-button" data-button="start" type="button">S</button>
    <div id="leds"></div>
  </div>
  <script>
    var canvas = document.getElementById('canvas');
    var statusEl = document.getElementById('status');
    console.log('[vbadge iframe] page booted');

    // --- Emulated badge peripherals (_webio bridge) ------------------------
    // Python side: staged neopixel shim calls _webio.leds_write() ->
    // Module.__webio.onLeds(Uint8Array of packed RGB); the fake WebExpander
    // polls Module.__webio.buttons (bitmask, bit positions == Fri3d 2026
    // expander digital tuple indices) and joy_x/joy_y (0..4095, 2048 center).
    var webio = { buttons: 0, joy_x: 2048, joy_y: 2048, onLeds: null };

    // NeoPixel dots. LED count adapts to the buffer length on first write.
    var ledsEl = document.getElementById('leds');
    for (var _i = 0; _i < 5; _i++) {
      var _dot = document.createElement('span');
      _dot.className = 'led';
      ledsEl.appendChild(_dot);
    }
    webio.onLeds = function (rgb) {
      var n = Math.floor(rgb.length / 3);
      while (ledsEl.children.length < n) {
        var dot = document.createElement('span');
        dot.className = 'led';
        ledsEl.appendChild(dot);
      }
      for (var i = 0; i < n; i++) {
        var r = rgb[i * 3], g = rgb[i * 3 + 1], b = rgb[i * 3 + 2];
        var el = ledsEl.children[i];
        if (r || g || b) {
          el.style.background = 'rgb(' + r + ',' + g + ',' + b + ')';
          el.style.boxShadow = '0 0 10px 3px rgba(' + r + ',' + g + ',' + b + ',0.9)';
        } else {
          el.style.background = '#ddd';
          el.style.boxShadow = 'inset 0 0 4px rgba(0,0,0,.35)';
        }
      }
    };

    // Buttons: bit positions match the expander digital tuple
    // (1 joy_right, 2 joy_left, 3 joy_down, 4 joy_up,
    //  5 menu, 6 b, 7 a, 8 y, 9 x). START is not on the physical expander
    //  (GPIO 0 on the badge), so it uses bit 12 — outside the 12-entry
    //  digital tuple — and is read separately by the web START indev.
    var BUTTON_BITS = { menu: 5, b: 6, a: 7, y: 8, x: 9, start: 12 };
    document.querySelectorAll('.pad-button').forEach(function (btn) {
      var bit = BUTTON_BITS[btn.dataset.button];
      function down(e) { e.preventDefault(); btn.classList.add('pressed'); webio.buttons |= (1 << bit); }
      function up() { btn.classList.remove('pressed'); webio.buttons &= ~(1 << bit); }
      btn.addEventListener('pointerdown', down);
      btn.addEventListener('pointerup', up);
      btn.addEventListener('pointerleave', up);
      btn.addEventListener('pointercancel', up);
    });

    // Joystick: draggable nub. Sets analog joy_x/joy_y AND the digital
    // direction bits (threshold at ~40% deflection) that the expander indev
    // driver maps to arrow keys.
    (function () {
      var pad = document.getElementById('joystick');
      var nub = document.getElementById('joystick-nub');
      var JOY_BITS = { right: 1, left: 2, down: 3, up: 4 };
      var dragging = false;
      function setJoy(dx, dy) { // dx/dy in -1..1
        nub.style.transform = 'translate(' + (dx * 26) + 'px,' + (dy * 26) + 'px)';
        webio.joy_x = Math.round(2048 + dx * 2047);
        webio.joy_y = Math.round(2048 + dy * 2047);
        var bits = webio.buttons & ~((1 << JOY_BITS.right) | (1 << JOY_BITS.left) | (1 << JOY_BITS.down) | (1 << JOY_BITS.up));
        if (dx > 0.4) bits |= (1 << JOY_BITS.right);
        if (dx < -0.4) bits |= (1 << JOY_BITS.left);
        if (dy > 0.4) bits |= (1 << JOY_BITS.down);
        if (dy < -0.4) bits |= (1 << JOY_BITS.up);
        webio.buttons = bits;
      }
      function move(e) {
        if (!dragging) return;
        var rect = pad.getBoundingClientRect();
        var dx = ((e.clientX - rect.left) / rect.width) * 2 - 1;
        var dy = ((e.clientY - rect.top) / rect.height) * 2 - 1;
        var mag = Math.sqrt(dx * dx + dy * dy);
        if (mag > 1) { dx /= mag; dy /= mag; }
        setJoy(dx, dy);
      }
      pad.addEventListener('pointerdown', function (e) {
        e.preventDefault();
        dragging = true;
        pad.setPointerCapture(e.pointerId);
        move(e);
      });
      pad.addEventListener('pointermove', move);
      function release() { dragging = false; setJoy(0, 0); }
      pad.addEventListener('pointerup', release);
      pad.addEventListener('pointercancel', release);
      pad.addEventListener('lostpointercapture', release);
      // Pointer can leave the iframe document entirely (capture breaks at
      // the frame boundary) — also release on window-level events and blur.
      window.addEventListener('pointerup', release);
      window.addEventListener('pointercancel', release);
      window.addEventListener('blur', release);
      document.addEventListener('pointerleave', release);
    })();

    var Module = {
      canvas: canvas,
      // Emulated badge peripherals; read/written by the _webio C module
      // (webio_js_init merges into this object at first Python access).
      __webio: webio,
      arguments: ['-X', 'heapsize=16M', '-m', 'main'],
      print: function (t) { console.log('[vbadge stdout-print]', t); },
      printErr: function (t) { console.error('[vbadge stderr]', t); },
      setStatus: function (t) {
        console.log('[vbadge status]', t);
        statusEl.textContent = t;
        if (t === '') statusEl.style.display = 'none';
      },
      // Stdio bridge for the parent frame (ViperIDE). The native _webterm
      // module reuses this exact object: parent installs onOutput and pushes
      // input bytes via push().
      __webterm: {
        inq: [],
        onOutput: null,
        _outbuf: [],
        _sched: false,
        push: function (data) {
          if (typeof data === 'number') { this.inq.push(data & 0xff); return; }
          for (var i = 0; i < data.length; i++) { this.inq.push(data[i] & 0xff); }
        }
      },
      // Per-byte stdout hook at the Emscripten TTY layer. The MPOS web build
      // is supposed to mirror stdout to __webterm.onOutput from C
      // (unix_mphal.c.patch), but the deployed build lacks that hook, so all
      // REPL traffic only reached Module.print (line-buffered, loses \x04
      // framing). Module.stdout receives every byte written to fd1 — raw REPL
      // control chars included — and batches them to onOutput.
      stdout: function (code) {
        if (code === null || code === undefined) return; // flush marker
        var H = Module.__webterm;
        H._outbuf.push(code & 0xff);
        if (!H._sched) {
          H._sched = true;
          setTimeout(function () {
            H._sched = false;
            if (!H._outbuf.length) return;
            var b = new Uint8Array(H._outbuf);
            H._outbuf.length = 0;
            if (typeof H.onOutput === 'function') { try { H.onOutput(b); } catch (e) {} }
          }, 0);
        }
      },
      preRun: [function () {
        canvas.addEventListener('click', function () { canvas.focus(); });
        // Persistent /data and /apps via IndexedDB (same as upstream shell).
        var IDB = FS.filesystems.IDBFS;
        try { FS.mkdir('/data'); } catch (e) {}
        try { FS.mkdir('/apps'); } catch (e) {}
        FS.mount(IDB, {}, '/data');
        FS.mount(IDB, {}, '/apps');
        addRunDependency('idbfs-load');
        FS.syncfs(true, function (err) {
          if (err) console.error('IDBFS initial load failed:', err);
          removeRunDependency('idbfs-load');
        });
      }],
      onRuntimeInitialized: function () {
        console.log('[vbadge iframe] onRuntimeInitialized');
        statusEl.textContent = '';
        canvas.focus();
        // Seed bundled demo apps into persistent /apps once, so the
        // launcher's app scan finds them (marker keeps uninstalls sticky).
        try {
          var marker = '/apps/.seeded';
          var seeded = false;
          try { FS.stat(marker); seeded = true; } catch (e) {}
          if (!seeded) {
            var haveBundle = false;
            try { FS.stat('/.bundled_apps'); haveBundle = true; } catch (e) {}
            if (haveBundle) {
              (function copyRec(src, dst) {
                var entries = FS.readdir(src);
                for (var i = 0; i < entries.length; i++) {
                  var name = entries[i];
                  if (name === '.' || name === '..') continue;
                  var s = src + '/' + name, d = dst + '/' + name;
                  var mode;
                  try { mode = FS.stat(s).mode; } catch (e) { continue; }
                  if (FS.isDir(mode)) {
                    try { FS.mkdir(d); } catch (e) {}
                    copyRec(s, d);
                  } else {
                    try { FS.writeFile(d, FS.readFile(s)); } catch (e) {}
                  }
                }
              })('/.bundled_apps', '/apps');
              try { FS.writeFile(marker, '1'); } catch (e) {}
            }
          }
        } catch (e) { console.error('[vbadge iframe] seed apps failed:', e); }
        setInterval(function () { FS.syncfs(false, function () {}); }, 4000);
      }
    };
    window.Module = Module;

    // --- Pop-out mode ----------------------------------------------------
    // When opened as a standalone window (?popout=1) the badge has no
    // parent frame to poke Module.__webterm directly, so all stdio and
    // status flow over a fixed-name BroadcastChannel ('fri3d-ide-vbadge',
    // single IDE + single badge window per origin) back to the IDE:
    //   page -> IDE: {type:'hello'} on load, {type:'out', data:Uint8Array}
    //                for stdout, {type:'pong', calledRun, inqLen} replies,
    //                {type:'closed'} when the window goes away.
    //   IDE -> page: {type:'in', data} input bytes, {type:'ping'} boot/REPL
    //                probe, {type:'close'} to close the window.
    (function () {
      var params = new URLSearchParams(location.search);
      var isPWA = window.matchMedia('(display-mode: standalone), (display-mode: fullscreen)').matches;
      if (!params.get('popout') && !isPWA) return;
      document.body.classList.add('popout');

      // Scale badge to fit the viewport (phone landscape = full-screen badge).
      var badge = document.getElementById('badge');
      function fitBadge() {
        var s = Math.min(
          window.innerWidth / (badge.offsetWidth + 16),
          window.innerHeight / (badge.offsetHeight + 16));
        badge.style.transform = 'scale(' + Math.min(s, 2) + ')';
      }
      fitBadge();
      window.addEventListener('resize', fitBadge);
      window.addEventListener('orientationchange', fitBadge);

      var chan = new BroadcastChannel('fri3d-ide-vbadge');
      Module.__webterm.onOutput = function (b) {
        chan.postMessage({ type: 'out', data: b });
      };
      chan.onmessage = function (ev) {
        var m = ev.data || {};
        if (m.type === 'in') {
          Module.__webterm.push(m.data);
        } else if (m.type === 'ping') {
          chan.postMessage({
            type: 'pong',
            calledRun: !!Module.calledRun,
            inqLen: Module.__webterm.inq.length,
          });
        } else if (m.type === 'close') {
          window.close();
        }
      };
      document.getElementById('dock-btn').addEventListener('click', function () {
        // Ask the IDE to dock the badge back inline; IDE replies 'close'.
        chan.postMessage({ type: 'popin' });
      });
      chan.postMessage({ type: 'hello' });
      window.addEventListener('pagehide', function () {
        chan.postMessage({ type: 'closed' });
      });
    })();
  </script>
  <script async src="micropython.js"
          onerror="document.getElementById('status').textContent='Failed to load MicroPythonOS build'"></script>
</body>
</html>
